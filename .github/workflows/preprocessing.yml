name: Data Preprocessing
on:
  push:
    paths:
      - 'breast_cancer_raw/**'
      - 'preprocessing/automate_Erlangga.py'
    branches:
      - main
  workflow_dispatch:

jobs:
  preprocess:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn kagglehub

      - name: Run Preprocessing
        run: |
          cd preprocessing
          python automate_Erlangga.py --output ../titanic_preprocessing

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ../titanic_raw/
          git add ../titanic_preprocessing/
          git commit -m "Auto-update preprocessed dataset" || echo "No changes to commit"
          git push
